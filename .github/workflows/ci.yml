name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Secret scan (gitleaks)
        run: |
          VERSION=8.18.4
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          curl -sSfL "${BASE}/gitleaks_${VERSION}_linux_x64.tar.gz" -o "gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL "${BASE}/gitleaks_${VERSION}_checksums.txt" -o checksums.txt
          # Verify the download against the published checksum before trusting the binary.
          grep "gitleaks_${VERSION}_linux_x64.tar.gz" checksums.txt | sha256sum -c -
          tar -xzf "gitleaks_${VERSION}_linux_x64.tar.gz" gitleaks
          ./gitleaks detect --source . --no-banner --redact --exit-code 1

      - name: Audit production dependencies
        # Blocks CRITICAL vulns. next@14.2.35 (the latest 14.2.x patch) still carries
        # 1 high + 1 moderate advisory that are only fixed by next@16 — a breaking
        # major (React 19 + async route `params`) deliberately scoped to its own
        # upgrade branch. Tighten to `high`/remove the flag once that lands.
        run: npm audit --omit=dev --audit-level=critical

      - name: Build
        run: npm run build
        env:
          # Placeholder env so module-top-level SDK clients (Stripe, Upstash, R2)
          # construct while Next collects route data during the build. These are
          # non-functional and low-entropy; real secrets live ONLY in Vercel env.
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_placeholder
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: placeholder
          STRIPE_SECRET_KEY: sk_test_dummy
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder
          R2_ACCOUNT_ID: placeholder
          R2_ACCESS_KEY_ID: placeholder
          R2_SECRET_ACCESS_KEY: placeholder
          R2_PRIVATE_BUCKET: invites-private
